<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Meal Planner</title>
<style>
  :root {
    color-scheme: light;
    --bg: #faf8f3;
    --surface: #ffffff;
    --text: #1f2937;
    --text-soft: #6b7280;
    --border: #e5e7eb;
    --accent: #c2410c;
    --accent-soft: #fef3ec;
    --accent-hover: #9a3412;
    --success: #047857;
    --success-soft: #ecfdf5;
    --warning: #b45309;
    --shadow: 0 1px 2px rgba(15, 23, 42, 0.04), 0 4px 12px rgba(15, 23, 42, 0.04);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .app {
    max-width: 1180px;
    margin: 0 auto;
    padding: 24px 28px 80px;
  }
  header.top {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 20px;
  }
  h1 {
    font-size: 26px;
    margin: 0;
    letter-spacing: -0.01em;
    font-weight: 650;
  }
  .week-label {
    color: var(--text-soft);
    font-size: 13px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
  }
  h2 {
    margin: 0 0 12px;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  h3 {
    margin: 0 0 4px;
    font-size: 15px;
    font-weight: 600;
  }
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .col { display: flex; flex-direction: column; gap: 4px; }
  label.field {
    font-size: 12px;
    color: var(--text-soft);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  select, input[type="number"] {
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    min-width: 80px;
  }
  select:focus, input:focus {
    outline: 2px solid var(--accent-soft);
    border-color: var(--accent);
  }
  .equipment-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 8px;
    margin: 8px 0 0;
  }
  .equip-chip {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: white;
    cursor: pointer;
    transition: border-color .12s, background .12s;
    user-select: none;
    font-weight: 500;
  }
  .equip-chip:hover { border-color: #cbd5e1; }
  .equip-chip.active {
    border-color: var(--accent);
    background: var(--accent-soft);
    color: var(--accent-hover);
  }
  .equip-chip input { display: none; }
  .equip-icon { font-size: 18px; line-height: 1; }
  .presets { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  button {
    font-family: inherit;
    font-size: 14px;
    border: 1px solid var(--border);
    background: white;
    color: var(--text);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 500;
    transition: background .12s, border-color .12s, transform .05s;
  }
  button:hover { background: #f9fafb; border-color: #cbd5e1; }
  button:active { transform: translateY(1px); }
  button.primary {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  button.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  button.ghost {
    background: transparent;
    border-color: transparent;
    color: var(--text-soft);
    padding: 4px 8px;
  }
  button.ghost:hover { color: var(--text); background: #f3f4f6; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    margin: 16px 0 20px;
  }
  .layout {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 16px;
  }
  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
  }
  .meal-card {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: white;
    margin-bottom: 10px;
  }
  .meal-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .meal-day {
    font-size: 11px;
    color: var(--accent);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .meal-name { font-weight: 600; font-size: 15px; }
  .meal-meta {
    display: flex;
    gap: 12px;
    align-items: center;
    color: var(--text-soft);
    font-size: 12px;
    flex-wrap: wrap;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent-hover);
    font-size: 11px;
    font-weight: 600;
  }
  .meal-actions {
    display: flex;
    gap: 4px;
  }
  details.recipe summary {
    cursor: pointer;
    color: var(--text-soft);
    font-size: 12px;
    user-select: none;
    list-style: none;
  }
  details.recipe summary::before {
    content: "▸";
    display: inline-block;
    margin-right: 4px;
    transition: transform .15s;
  }
  details.recipe[open] summary::before { transform: rotate(90deg); }
  details.recipe ul {
    margin: 8px 0 0;
    padding-left: 18px;
    color: var(--text-soft);
    font-size: 13px;
  }
  details.recipe ol {
    margin: 8px 0 0;
    padding-left: 18px;
    font-size: 13px;
    line-height: 1.55;
  }
  .shop-section { margin-bottom: 14px; }
  .shop-section-title {
    font-size: 11px;
    color: var(--text-soft);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 6px;
  }
  .shop-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    font-size: 13px;
  }
  .shop-item input[type="checkbox"] {
    appearance: none;
    width: 16px;
    height: 16px;
    border: 1.5px solid #cbd5e1;
    border-radius: 4px;
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
  }
  .shop-item input[type="checkbox"]:checked {
    background: var(--success);
    border-color: var(--success);
  }
  .shop-item input[type="checkbox"]:checked::after {
    content: "✓";
    color: white;
    position: absolute;
    top: -2px;
    left: 2px;
    font-size: 13px;
    font-weight: 700;
  }
  .shop-item.checked label { text-decoration: line-through; color: var(--text-soft); }
  .shop-item label { cursor: pointer; flex: 1; }
  .shop-item .qty { color: var(--text-soft); font-variant-numeric: tabular-nums; }
  .empty {
    text-align: center;
    color: var(--text-soft);
    padding: 32px 16px;
    font-size: 14px;
  }
  .empty p { margin: 4px 0; }
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #1f2937;
    color: white;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s;
  }
  .toast.show { opacity: 1; }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin .8s linear infinite;
    display: inline-block;
    vertical-align: -2px;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .saved-note {
    font-size: 11px;
    color: var(--success);
    margin-left: 8px;
  }
  .equipment-summary {
    color: var(--text-soft);
    font-size: 13px;
  }
  details.config { margin-top: 4px; }
  details.config summary {
    cursor: pointer;
    font-weight: 600;
    color: var(--accent);
    font-size: 13px;
    user-select: none;
  }
  hr.sep {
    border: none;
    border-top: 1px solid var(--border);
    margin: 14px 0;
  }
  .copy-btn { margin-top: 8px; }
  .meals-empty-equip {
    background: #fef3c7;
    border-left: 3px solid var(--warning);
    padding: 12px 14px;
    border-radius: 6px;
    font-size: 13px;
    color: #78350f;
    margin-top: 8px;
  }
</style>
</head>
<body>

<div class="app">

  <header class="top">
    <div>
      <h1>Weekly Meal Planner</h1>
      <div class="week-label" id="weekLabel">—</div>
    </div>
    <div class="row">
      <span class="equipment-summary" id="equipSummary"></span>
    </div>
  </header>

  <!-- EQUIPMENT + SETTINGS -->
  <section class="card" id="configCard">
    <details class="config" id="configDetails">
      <summary>Kitchen setup &amp; preferences</summary>

      <div style="margin-top: 16px;">
        <h2>What's working in your kitchen?</h2>
        <div class="presets" id="presets"></div>
        <div class="equipment-grid" id="equipmentGrid"></div>
      </div>

      <hr class="sep">

      <h2>Plan settings</h2>
      <div class="row">
        <div class="col">
          <label class="field" for="household">Household size</label>
          <input type="number" id="household" min="1" max="12" value="4">
        </div>
        <div class="col">
          <label class="field" for="numDays">Meals to plan</label>
          <input type="number" id="numDays" min="1" max="14" value="5">
        </div>
        <div class="col">
          <label class="field" for="cookTime">Max weeknight cook time</label>
          <select id="cookTime">
            <option value="30">Under 30 min</option>
            <option value="45" selected>30–45 min</option>
            <option value="60">Up to 1 hour</option>
            <option value="999">Any</option>
          </select>
        </div>
      </div>

      <hr class="sep">

      <h2>AI regenerate (optional)</h2>
      <p style="margin: 0 0 8px; color: var(--text-soft); font-size: 13px;">
        Paste your Cloudflare Worker URL to enable the ✨ AI regenerate button.
        See the project README for one-time deploy instructions.
      </p>
      <div class="row">
        <div class="col" style="flex: 1; min-width: 280px;">
          <label class="field" for="proxyUrl">Worker URL</label>
          <input type="text" id="proxyUrl" placeholder="https://meal-planner-ai.YOUR-NAME.workers.dev" style="width: 100%;">
        </div>
      </div>
    </details>
  </section>

  <div class="actions">
    <button class="primary" id="generateBtn">Generate week's plan</button>
    <button id="aiBtn">✨ Regenerate with AI</button>
    <button class="ghost" id="clearBtn">Clear plan</button>
    <span class="saved-note" id="savedNote"></span>
  </div>

  <div class="layout">
    <!-- MEAL PLAN -->
    <section class="card">
      <h2>This week's meals</h2>
      <div id="mealPlan"></div>
    </section>

    <!-- SHOPPING LIST -->
    <section class="card">
      <h2>Shopping list</h2>
      <div id="shoppingList"></div>
      <button class="ghost copy-btn" id="copyBtn" style="display:none">📋 Copy unchecked items</button>
    </section>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { ...defaultState };
    const parsed = JSON.parse(raw);
    return { ...defaultState, ...parsed };
  } catch (e) {
    console.warn('Could not load state', e);
    return { ...defaultState };
  }
}

function saveState() {
  state.lastUpdated = Date.now();
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    flashSaved();
  } catch (e) {
    console.warn('Could not save state', e);
  }
}

let state = loadState();

// =============================================================
// HELPERS
// =============================================================
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

function canCook(recipe, available) {
  return recipe.equipmentOptions.some(combo =>
    combo.every(eq => available.includes(eq))
  );
}

function equipmentUsed(recipe, available) {
  // Return the FIRST combo that satisfies, to display.
  return recipe.equipmentOptions.find(combo => combo.every(eq => available.includes(eq))) || [];
}

function equipmentLabel(id) {
  const e = EQUIPMENT.find(x => x.id === id);
  return e ? `${e.icon} ${e.label}` : id;
}

function getCurrentWeekLabel() {
  const now = new Date();
  const opts = { month: 'short', day: 'numeric' };
  return `Week of ${now.toLocaleDateString('en-US', opts)}`;
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function scaleIngredient(ing, factor) {
  return {
    ...ing,
    qty: Math.round(ing.qty * factor * 100) / 100,
  };
}

function flashSaved() {
  const note = document.getElementById('savedNote');
  note.textContent = '✓ Saved';
  clearTimeout(flashSaved._t);
  flashSaved._t = setTimeout(() => { note.textContent = ''; }, 1500);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.classList.remove('show'), 2200);
}

// =============================================================
// MEAL PLAN GENERATION (library mode)
// =============================================================
function generatePlanFromLibrary() {
  const available = state.equipment;
  const eligible = RECIPES.filter(r =>
    canCook(r, available) && r.cookTime <= state.cookTimeMax
  );

  if (eligible.length === 0) {
    showToast('No recipes match your equipment + time. Try expanding either.');
    return [];
  }

  // Prefer recipes not used recently
  const recent = new Set(state.recentRecipeIds || []);
  const fresh = eligible.filter(r => !recent.has(r.id));
  let pool = shuffle(fresh.length >= state.numDays ? fresh : eligible);

  const picks = [];
  for (let i = 0; i < state.numDays; i++) {
    if (pool.length === 0) pool = shuffle(eligible);
    picks.push(pool.shift());
  }

  // Update recents (keep last 12)
  const newRecents = [...picks.map(p => p.id), ...(state.recentRecipeIds || [])];
  state.recentRecipeIds = [...new Set(newRecents)].slice(0, 12);

  const plan = picks.map((recipe, i) => ({
    day: DAYS[i] || `Day ${i + 1}`,
    recipe,
    source: 'library',
  }));
  return plan;
}

// =============================================================
// SHOPPING LIST AGGREGATION
// =============================================================
function buildShoppingList(plan) {
  if (!plan.length) return {};

  const factor = state.household / 4;
  const map = new Map();

  plan.forEach(entry => {
    const recipe = entry.recipe;
    const recipeFactor = factor; // every recipe baselined at 4 servings
    recipe.ingredients.forEach(ing => {
      const key = `${ing.name.toLowerCase()}|${(ing.unit || '').toLowerCase()}`;
      if (map.has(key)) {
        const existing = map.get(key);
        existing.qty = Math.round((existing.qty + ing.qty * recipeFactor) * 100) / 100;
      } else {
        map.set(key, {
          name: ing.name,
          qty: Math.round(ing.qty * recipeFactor * 100) / 100,
          unit: ing.unit || '',
          category: ing.category || 'Other',
        });
      }
    });
  });

  // Group by category
  const grouped = {};
  map.forEach(v => {
    if (!grouped[v.category]) grouped[v.category] = [];
    grouped[v.category].push(v);
  });
  Object.values(grouped).forEach(arr => arr.sort((a, b) => a.name.localeCompare(b.name)));
  return grouped;
}

const CATEGORY_ORDER = ['Produce', 'Meat & Seafood', 'Dairy & Eggs', 'Bakery', 'Pantry', 'Frozen', 'Condiments', 'Spices', 'Other'];

// =============================================================
// RENDER
// =============================================================
function renderEquipment() {
  // Presets
  const presetsEl = document.getElementById('presets');
  presetsEl.innerHTML = '';
  PRESETS.forEach(p => {
    const btn = document.createElement('button');
    btn.textContent = p.label;
    btn.onclick = () => {
      state.equipment = [...p.equipment];
      saveState();
      renderEquipment();
      renderSummary();
    };
    presetsEl.appendChild(btn);
  });

  // Grid
  const grid = document.getElementById('equipmentGrid');
  grid.innerHTML = '';
  EQUIPMENT.forEach(eq => {
    const label = document.createElement('label');
    label.className = 'equip-chip' + (state.equipment.includes(eq.id) ? ' active' : '');
    label.innerHTML = `
      <span class="equip-icon">${eq.icon}</span>
      <span>${eq.label}</span>
      <input type="checkbox" ${state.equipment.includes(eq.id) ? 'checked' : ''}>
    `;
    label.querySelector('input').onchange = (e) => {
      if (e.target.checked) {
        if (!state.equipment.includes(eq.id)) state.equipment.push(eq.id);
      } else {
        state.equipment = state.equipment.filter(x => x !== eq.id);
      }
      saveState();
      renderEquipment();
      renderSummary();
    };
    grid.appendChild(label);
  });
}

function renderSummary() {
  const el = document.getElementById('equipSummary');
  if (state.equipment.length === 0) {
    el.textContent = 'No equipment selected';
    return;
  }
  const items = state.equipment.map(id => {
    const e = EQUIPMENT.find(x => x.id === id);
    return e ? e.icon : id;
  });
  el.textContent = items.join('  ') + `  ·  ${state.household} servings  ·  ${state.cookTimeMax >= 999 ? 'any' : '≤'+state.cookTimeMax} min`;
}

function renderPlan() {
  const el = document.getElementById('mealPlan');
  el.innerHTML = '';

  if (!state.plan || state.plan.length === 0) {
    el.innerHTML = `
      <div class="empty">
        <p style="font-size: 28px; margin: 0;">🍽️</p>
        <p>No plan yet. Click <strong>Generate week's plan</strong> above.</p>
      </div>
    `;
    return;
  }

  state.plan.forEach((entry, idx) => {
    const r = entry.recipe;
    let usedLabels;
    if (entry.source === 'ai') {
      // For AI meals, trust the equipment list — the AI was constrained to your kit.
      const aiEq = (r.equipmentOptions[0] || []);
      usedLabels = aiEq.length ? aiEq.map(equipmentLabel).join(' + ') : 'AI-planned';
    } else {
      const used = equipmentUsed(r, state.equipment);
      usedLabels = used.map(equipmentLabel).join(' + ') || '⚠️ needs equipment you don\'t have';
    }
    const card = document.createElement('div');
    card.className = 'meal-card';
    card.innerHTML = `
      <div class="meal-head">
        <div>
          <div class="meal-day">${entry.day}</div>
          <div class="meal-name">${r.name}</div>
          <div class="meal-meta">
            <span>⏱ ${r.cookTime} min</span>
            <span class="badge">${usedLabels}</span>
            ${entry.source === 'ai' ? '<span class="badge" style="background:#eef2ff;color:#4338ca">✨ AI</span>' : ''}
          </div>
        </div>
        <div class="meal-actions">
          <button class="ghost" data-action="swap" data-idx="${idx}" title="Swap this meal">🔄</button>
          <button class="ghost" data-action="remove" data-idx="${idx}" title="Remove">✕</button>
        </div>
      </div>
      <details class="recipe">
        <summary>Recipe &amp; ingredients</summary>
        ${r.description ? `<p style="margin: 8px 0 4px; color: var(--text-soft); font-size:13px">${r.description}</p>` : ''}
        <strong style="font-size:12px; color: var(--text-soft); text-transform: uppercase; letter-spacing: .05em;">Ingredients</strong>
        <ul>
          ${r.ingredients.map(i => {
            const factor = state.household / 4;
            const q = Math.round(i.qty * factor * 100) / 100;
            return `<li>${q} ${i.unit ? i.unit + ' ' : ''}${i.name}</li>`;
          }).join('')}
        </ul>
        ${r.steps ? `<strong style="font-size:12px; color: var(--text-soft); text-transform: uppercase; letter-spacing: .05em; display:block; margin-top:10px;">Steps</strong>
        <ol>${r.steps.map(s => `<li>${s}</li>`).join('')}</ol>` : ''}
      </details>
    `;
    el.appendChild(card);
  });

  // wire up swap / remove
  el.querySelectorAll('button[data-action]').forEach(btn => {
    btn.onclick = () => {
      const idx = parseInt(btn.dataset.idx, 10);
      const action = btn.dataset.action;
      if (action === 'remove') {
        state.plan.splice(idx, 1);
      } else if (action === 'swap') {
        const available = state.equipment;
        const eligible = RECIPES.filter(r =>
          canCook(r, available) &&
          r.cookTime <= state.cookTimeMax &&
          !state.plan.some(e => e.recipe.id === r.id)
        );
        if (eligible.length === 0) {
          showToast('No alternative recipes match your kit.');
          return;
        }
        const pick = eligible[Math.floor(Math.random() * eligible.length)];
        state.plan[idx] = { ...state.plan[idx], recipe: pick };
      }
      saveState();
      renderPlan();
      renderShopping();
    };
  });
}

function renderShopping() {
  const el = document.getElementById('shoppingList');
  const copyBtn = document.getElementById('copyBtn');
  el.innerHTML = '';

  if (!state.plan || state.plan.length === 0) {
    el.innerHTML = `<div class="empty"><p>Generate a plan to build your shopping list.</p></div>`;
    copyBtn.style.display = 'none';
    return;
  }

  const grouped = buildShoppingList(state.plan);
  const cats = Object.keys(grouped).sort((a, b) => {
    const ai = CATEGORY_ORDER.indexOf(a);
    const bi = CATEGORY_ORDER.indexOf(b);
    return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
  });

  if (cats.length === 0) {
    el.innerHTML = `<div class="empty"><p>Nothing to buy yet.</p></div>`;
    copyBtn.style.display = 'none';
    return;
  }

  cats.forEach(cat => {
    const section = document.createElement('div');
    section.className = 'shop-section';
    section.innerHTML = `<div class="shop-section-title">${cat}</div>`;
    grouped[cat].forEach(item => {
      const key = `${item.name.toLowerCase()}|${item.unit.toLowerCase()}`;
      const checked = !!state.shoppingChecked[key];
      const row = document.createElement('div');
      row.className = 'shop-item' + (checked ? ' checked' : '');
      const id = 'chk-' + key.replace(/[^a-z0-9]/g, '');
      row.innerHTML = `
        <input type="checkbox" id="${id}" ${checked ? 'checked' : ''}>
        <label for="${id}"><span class="qty">${item.qty}${item.unit ? ' ' + item.unit : ''}</span> · ${item.name}</label>
      `;
      row.querySelector('input').onchange = (e) => {
        state.shoppingChecked[key] = e.target.checked;
        saveState();
        row.classList.toggle('checked', e.target.checked);
      };
      section.appendChild(row);
    });
    el.appendChild(section);
  });

  copyBtn.style.display = 'inline-block';
  copyBtn.onclick = () => {
    const lines = [];
    cats.forEach(cat => {
      const items = grouped[cat].filter(i => {
        const key = `${i.name.toLowerCase()}|${i.unit.toLowerCase()}`;
        return !state.shoppingChecked[key];
      });
      if (items.length === 0) return;
      lines.push(`\n${cat.toUpperCase()}`);
      items.forEach(i => lines.push(`  ${i.qty}${i.unit ? ' ' + i.unit : ''}  ${i.name}`));
    });
    const txt = lines.join('\n').trim();
    if (!txt) {
      showToast('Everything is checked off — nothing to copy.');
      return;
    }
    navigator.clipboard.writeText(txt).then(() => showToast('Copied shopping list ✓'));
  };
}

function renderAll() {
  document.getElementById('weekLabel').textContent = getCurrentWeekLabel();
  renderEquipment();
  renderSummary();
  renderPlan();
  renderShopping();
}

// =============================================================
// AI REGENERATE (uses window.cowork.askClaude if available)
// =============================================================
async function regenerateWithAI() {
  const btn = document.getElementById('aiBtn');
  btn.disabled = true;
  const originalText = btn.textContent;
  btn.innerHTML = '<span class="spinner"></span>Asking Claude…';

  try {
    const equipLabels = state.equipment.map(id => {
      const e = EQUIPMENT.find(x => x.id === id);
      return e ? e.label : id;
    }).join(', ') || 'no equipment';

    const recentNames = (state.plan || []).map(p => p.recipe.name).join('; ');

    const prompt = `Generate a ${state.numDays}-day dinner meal plan for a household of ${state.household} people.
Available cooking equipment: ${equipLabels}.
Maximum weeknight cook time: ${state.cookTimeMax === 999 ? 'any' : state.cookTimeMax} minutes.
Avoid repeating: ${recentNames || '(none)'}.

CRITICAL: every recipe must be cookable using ONLY the listed equipment. Do not require any tool not in the list.

Return ONLY valid JSON with this exact shape (no markdown, no commentary, no fences):
{
  "meals": [
    {
      "name": "string",
      "description": "one-line description",
      "cookTime": 30,
      "equipmentUsed": ["air_fryer"],
      "ingredients": [
        {"name": "Chicken thighs", "qty": 1.5, "unit": "lb", "category": "Meat & Seafood"}
      ],
      "steps": ["short step 1", "short step 2"]
    }
  ]
}

Use these category values only: Produce, Meat & Seafood, Dairy & Eggs, Bakery, Pantry, Frozen, Condiments, Spices.
Scale ingredients for 4 servings as the baseline (the app will rescale).`;

    // Resolve AI backend: Cowork in-app → configured proxy URL → fallback to library
    let rawResponse;
    if (window.cowork && window.cowork.askClaude) {
      rawResponse = await window.cowork.askClaude(prompt, []);
    } else if (state.proxyUrl) {
      const proxyResp = await fetch(state.proxyUrl, {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ prompt }),
      });
      if (!proxyResp.ok) {
        const errText = await proxyResp.text().catch(() => '');
        throw new Error(`Proxy error ${proxyResp.status}: ${errText.slice(0, 200)}`);
      }
      const data = await proxyResp.json();
      rawResponse = data.text || data.content || JSON.stringify(data);
    } else {
      showToast('Set up the Worker URL in Settings, or use the library plan.');
      document.getElementById('configDetails').open = true;
      document.getElementById('proxyUrl').focus();
      return;
    }

    let parsed;
    try {
      const txt = typeof rawResponse === 'string' ? rawResponse : (rawResponse?.text || JSON.stringify(rawResponse));
      const match = txt.match(/\{[\s\S]*\}/);
      parsed = JSON.parse(match ? match[0] : txt);
    } catch (e) {
      console.warn('Could not parse AI response', e, rawResponse);
      showToast('Couldn\'t parse AI response. Try again or use library plan.');
      return;
    }

    if (!parsed.meals || !Array.isArray(parsed.meals)) {
      showToast('AI response missing meals. Try again.');
      return;
    }

    state.plan = parsed.meals.slice(0, state.numDays).map((m, i) => ({
      day: DAYS[i] || `Day ${i + 1}`,
      source: 'ai',
      recipe: {
        id: 'ai-' + Date.now() + '-' + i,
        name: m.name || 'Untitled',
        description: m.description || '',
        cookTime: m.cookTime || 45,
        servings: 4,
        equipmentOptions: [m.equipmentUsed || []],
        ingredients: (m.ingredients || []).map(ing => ({
          name: ing.name || 'ingredient',
          qty: Number(ing.qty) || 1,
          unit: ing.unit || '',
          category: ing.category || 'Other',
        })),
        steps: m.steps || [],
      }
    }));

    state.weekStart = Date.now();
    saveState();
    renderPlan();
    renderShopping();
    showToast('Fresh AI plan ready ✨');
  } catch (e) {
    console.error(e);
    showToast('AI request failed. Try again later.');
  } finally {
    btn.disabled = false;
    btn.textContent = originalText;
  }
}

// =============================================================
// EVENT WIRING
// =============================================================
function bindControls() {
  const household = document.getElementById('household');
  household.value = state.household;
  household.onchange = () => {
    state.household = Math.max(1, Math.min(12, parseInt(household.value) || 4));
    saveState();
    renderSummary();
    renderPlan();
    renderShopping();
  };

  const numDays = document.getElementById('numDays');
  numDays.value = state.numDays;
  numDays.onchange = () => {
    state.numDays = Math.max(1, Math.min(14, parseInt(numDays.value) || 5));
    saveState();
    renderSummary();
  };

  const cookTime = document.getElementById('cookTime');
  cookTime.value = String(state.cookTimeMax);
  cookTime.onchange = () => {
    state.cookTimeMax = parseInt(cookTime.value);
    saveState();
    renderSummary();
  };

  const proxyUrl = document.getElementById('proxyUrl');
  proxyUrl.value = state.proxyUrl || '';
  proxyUrl.onchange = () => {
    state.proxyUrl = proxyUrl.value.trim();
    saveState();
  };

  document.getElementById('generateBtn').onclick = () => {
    if (state.equipment.length === 0) {
      showToast('Pick at least one piece of equipment first.');
      document.getElementById('configDetails').open = true;
      return;
    }
    state.plan = generatePlanFromLibrary();
    state.shoppingChecked = {};
    state.weekStart = Date.now();
    saveState();
    renderPlan();
    renderShopping();
  };

  document.getElementById('aiBtn').onclick = regenerateWithAI;

  document.getElementById('clearBtn').onclick = () => {
    state.plan = [];
    state.shoppingChecked = {};
    saveState();
    renderPlan();
    renderShopping();
  };
}

// Open config the first time the user opens the app
if (!state.plan || state.plan.length === 0) {
  setTimeout(() => {
    const d = document.getElementById('configDetails');
    if (d) d.open = true;
  }, 0);
}

bindControls();
renderAll();
</script>
